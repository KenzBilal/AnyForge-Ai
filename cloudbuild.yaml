steps:
  # Step 1: Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/anyforge-ai/api:$COMMIT_SHA
      - .

  # Step 2: Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - asia-south1-docker.pkg.dev/$PROJECT_ID/anyforge-ai/api:$COMMIT_SHA

  # Step 3: Deploy to Cloud Run (Mumbai — same region as Supabase)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - anyforge-ai
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/anyforge-ai/api:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8000
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-env-vars=GEMINI_API_KEY=$$GEMINI_API_KEY,SUPABASE_URL=$$SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY=$$SUPABASE_SERVICE_ROLE_KEY

substitutions:
  _REGION: asia-south1

images:
  - asia-south1-docker.pkg.dev/$PROJECT_ID/anyforge-ai/api:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
